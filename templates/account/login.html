{% extends "shop/base.html" %} {% load socialaccount %} {% block title %}Вход |
Python Shop{% endblock %} {% block content %}
<div
    style="
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 60vh;
    "
>
    <div
        style="
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
        "
    >
        <h2 style="margin-bottom: 10px; color: var(--secondary)">
            Вход в аккаунт
        </h2>
        <p style="color: #636e72; margin-bottom: 30px; font-size: 0.9rem">
            Используйте соцсети или логин
        </p>

        <div
            style="
                display: flex;
                flex-direction: column;
                gap: 12px;
                margin-bottom: 25px;
            "
        >
            <a
                href="{% provider_login_url 'google' %}"
                class="social-btn btn-google"
                style="
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    gap: 10px;
                    padding: 12px;
                    text-decoration: none;
                    font-weight: 600;
                "
            >
                <i class="fab fa-google"></i> Войти через Google
            </a>
        </div>

        <div
            style="
                margin: 20px 0;
                border-top: 1px solid #eee;
                position: relative;
            "
        >
            <span
                style="
                    position: absolute;
                    top: -10px;
                    left: 50%;
                    transform: translateX(-50%);
                    background: white;
                    padding: 0 10px;
                    color: #b2bec3;
                    font-size: 0.8rem;
                "
                >ИЛИ</span
            >
        </div>

        <form method="POST" style="text-align: left">
            {% csrf_token %}

            <div style="margin-bottom: 15px">
                <label
                    style="
                        display: block;
                        margin-bottom: 5px;
                        font-size: 0.9rem;
                    "
                    >Логин:</label
                >
                <input
                    type="text"
                    name="login"
                    style="
                        width: 100%;
                        padding: 10px;
                        border: 1px solid #ddd;
                        border-radius: 6px;
                        box-sizing: border-box;
                    "
                />
            </div>

            <div style="margin-bottom: 20px">
                <label
                    style="
                        display: block;
                        margin-bottom: 5px;
                        font-size: 0.9rem;
                    "
                    >Пароль:</label
                >
                <input
                    type="password"
                    name="password"
                    style="
                        width: 100%;
                        padding: 10px;
                        border: 1px solid #ddd;
                        border-radius: 6px;
                        box-sizing: border-box;
                    "
                />
            </div>

            <button
                type="submit"
                class="btn"
                style="
                    width: 100%;
                    background: var(--success);
                    color: white;
                    padding: 12px;
                    border-radius: 6px;
                    font-size: 1rem;
                "
            >
                Войти в магазин
            </button>
        </form>

        <p style="margin-top: 25px; font-size: 0.9rem; color: #636e72">
            Нет аккаунта?
            <a
                href="{% url 'account_signup' %}"
                style="
                    color: var(--primary);
                    text-decoration: none;
                    font-weight: 600;
                "
                >Зарегистрироваться</a
            >
        </p>
    </div>
</div>
{% endblock %}
